# gitleaks configuration — extends the default ruleset.
# Doc: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml

[extend]
useDefault = true

[allowlist]
description = "Test fixtures / example values that look secret-shaped but aren't."
paths = [
  '''(?i)test/fixtures/''',
  '''(?i)docs/''',
]
regexes = [
  # README example token placeholder
  '''eyJ\.{3}''',
  # docs use these literal stubs
  '''<token from your hub admin>''',
  '''<token from hub admin>''',
  '''accessToken.{0,5}placeholder''',
]
