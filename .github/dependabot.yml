version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci"
      include: scope

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: scope
    # We have ~zero runtime npm deps right now; bumps will mostly be devDeps.
    # Group patch + minor bumps to reduce PR noise.
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
