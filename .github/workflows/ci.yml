name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR / branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          shellcheck --severity=warning \
            src/hapi-monitor.sh \
            scripts/build-plotter.sh \
            test/smoke.sh

  python-syntax:
    name: python-syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Extract embedded Python and syntax-check
        run: bash scripts/lint-py.sh

  build-plotter:
    name: build-plotter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Build native chart plotter
        run: bash scripts/build-plotter.sh
      - name: Smoke-test the binary
        run: |
          ./src/plotter/hapi-sessions-plot < /dev/null > /dev/null || rc=$?
          # The plotter expects JSON on stdin; empty input may exit non-zero,
          # but we mainly want to know the binary loads + runs without segfault.
          if [[ ${rc:-0} -lt 0 || ${rc:-0} -ge 130 ]]; then
            echo "plotter crashed with $rc"
            exit 1
          fi

  node-wrapper:
    name: node-wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Validate package.json
        run: node -e "require('./package.json')"
      - name: Verify bin wrapper syntax
        run: node --check bin/hapi-monitor.js
      - name: Wrapper shows help (no hub required)
        run: node bin/hapi-monitor.js --help

  smoke:
    name: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run smoke test
        run: bash test/smoke.sh

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  owasp-sast:
    name: owasp-sast
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.122.0
    steps:
      - uses: actions/checkout@v6
      - name: Semgrep OWASP gate
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/python \
            --config p/secrets \
            --config security/semgrep/ \
            --error \
            --metrics off

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [shellcheck, python-syntax, build-plotter, node-wrapper, smoke, secret-scan, owasp-sast]
    if: always()
    steps:
      - name: Aggregate result
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more required jobs failed."
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required jobs were cancelled."
            exit 1
          fi
          echo "All required jobs passed."
